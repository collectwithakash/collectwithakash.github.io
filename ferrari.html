<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferrari Collection</title>

<style>
body{
background:#050505;
color:white;
font-family:Montserrat,sans-serif;
padding:40px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.03);
}

.back{
display:inline-block;
margin-bottom:30px;
padding:10px 20px;
background:red;
color:white;
text-decoration:none;
border-radius:5px;
}


.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:9999;
}

.lightbox img{
max-width:90%;
max-height:90%;
object-fit:contain;
}

.close{
position:absolute;
top:20px;
right:40px;
font-size:50px;
color:white;
cursor:pointer;
}

.prev,
.next{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:60px;
color:white;
cursor:pointer;
padding:20px;
user-select:none;
}

.prev{
left:20px;
}

.next{
right:20px;
}



@media(max-width:768px){

body{
padding:20px;
}

h1{
font-size:28px;
}

.prev,
.next{
font-size:40px;
padding:10px;
}

.close{
font-size:40px;
right:20px;
}

} 

</style>
</head>
<body>

<a href="index.html" class="back">← Back</a>

<h1>Ferrari Collection</h1>

<div class="gallery">

<img src="Ferrari/IMG_8460 (13).JPG" onclick="openImage(this.src)">
<img src="Ferrari/IMG_8457 (14).JPG" onclick="openImage(this.src)">
<img src="Ferrari/IMG_8459 (15).JPG" onclick="openImage(this.src)">
<img src="Ferrari/IMG_8454 (16).JPG" onclick="openImage(this.src)">
<img src="Ferrari/IMG_8458 (17).JPG" onclick="openImage(this.src)">
<img src="Ferrari/IMG_8455 (18).JPG " onclick="openImage(this.src)">
<img src="Ferrari/IMG_8462 (19).JPG " onclick="openImage(this.src)">
<img src="Ferrari/IMG_8453 (20).JPG " onclick="openImage(this.src)">


<img src="Ferrari/IMG_8627 (1).JPG" onclick="openImage(this.src)">
<img src="Ferrari/IMG_8624 (2).JPG" onclick="openImage(this.src)">
<img src="Ferrari/IMG_8625 (3).JPG" onclick="openImage(this.src)">
<img src="Ferrari/IMG_8630 (4).JPG" onclick="openImage(this.src)">
<img src="Ferrari/IMG_8628 (5).JPG" onclick="openImage(this.src)">
<img src="Ferrari/IMG_8633 (6).JPG" onclick="openImage(this.src)">
<img src="Ferrari/IMG_8629 (7).JPG" onclick="openImage(this.src)">
<img src="Ferrari/IMG_8631 (8).JPG" onclick="openImage(this.src)">
<img src="Ferrari/IMG_8634 (9).JPG" onclick="openImage(this.src)">
<img src="Ferrari/IMG_8635 (10).JPG" onclick="openImage(this.src)">
<img src="Ferrari/IMG_8632 (11).JPG" onclick="openImage(this.src)">
<img src="Ferrari/IMG_8626 (12).JPG" onclick="openImage(this.src)">
 
</div>

<div id="lightbox" class="lightbox">
  <span class="close" onclick="closeImage()">&times;</span>

  <span class="prev" onclick="changeImage(-1)">&#10094;</span>

  <img id="lightbox-img">
 
  <span class="next" onclick="changeImage(1)">&#10095;</span>
</div>


<script>

const images = Array.from(document.querySelectorAll('.gallery img'));
let currentIndex = 0;


function openImage(src){

  currentIndex = images.findIndex(img => img.src === src);

  document.getElementById('lightbox').style.display = 'flex';
  document.getElementById('lightbox-img').src = src;

}

function closeImage(){
  document.getElementById('lightbox').style.display = 'none';
}

function changeImage(direction){

  currentIndex += direction;

  if(currentIndex < 0){
    currentIndex = images.length - 1;
  }

  if(currentIndex >= images.length){
    currentIndex = 0;
  }

  document.getElementById('lightbox-img').src =
  images[currentIndex].src;
 
}

document.addEventListener('keydown', function(e){

if(document.getElementById('lightbox').style.display === 'flex'){

if(e.key === 'ArrowLeft'){
changeImage(-1);
}

if(e.key === 'ArrowRight'){
changeImage(1);
}

if(e.key === 'Escape'){
closeImage();
}

}

});

document.getElementById('lightbox').addEventListener('click', function(e){

if(e.target === this){
closeImage();
}

});
 
</script>



</body>
</html>
