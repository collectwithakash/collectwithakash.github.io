<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Wheels Collection</title>

<style>

.viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:9999;
}

.viewer img{
max-width:90%;
max-height:90%;
}

.close{
position:absolute;
top:20px;
right:40px;
font-size:50px;
color:white;
cursor:pointer;
}  
  
body{
background:black;
color:white;
font-family:Montserrat,sans-serif;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.gallery{
display:flex;
gap:20px;
overflow-x:auto;
overflow-y:hidden;
padding-bottom:10px;
scroll-behavior:smooth;
scrollbar-width:none;
}

.gallery::-webkit-scrollbar{
display:none;
}

.gallery img{
height:300px;
border-radius:10px;
cursor:pointer;
}

.back{
display:inline-block;
margin-bottom:20px;
padding:10px 15px;
background:red;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:700;
}  

.prev,
.next{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:60px;
color:white;
cursor:pointer;
padding:20px;
z-index:10000;
user-select:none;
}

.prev{
left:20px;
}

.next{
right:20px;
}
  
</style>
</head>
<body>

<a href="index.html" class="back">← Back to Home</a> 
<h1>Hot Wheels Collection</h1>

<div class="gallery">


<img src="Hotwheels/IMG_6741.JPG" onclick="openImage(this.src)">
<img src="Hotwheels/IMG_8699.JPG" onclick="openImage(this.src)">
<img src="Hotwheels/IMG_8700.JPG" onclick="openImage(this.src)">

</div>

<div id="viewer" class="viewer">
  <span class="close" onclick="closeImage()">&times;</span>

  <span class="prev" onclick="changeImage(-1)">❮</span>

  <img id="viewer-img">

  <span class="next" onclick="changeImage(1)">❯</span>
</div>

<script>

const images = Array.from(document.querySelectorAll('.gallery img'));
let currentIndex = 0;

function openImage(src){

  currentIndex = images.findIndex(img => img.src === src);

  document.getElementById('viewer').style.display='flex';
  document.getElementById('viewer-img').src = src;
}

function closeImage(){
  document.getElementById('viewer').style.display='none';
}

function changeImage(direction){

  currentIndex += direction;

  if(currentIndex < 0){
    currentIndex = images.length - 1;
  }

  if(currentIndex >= images.length){
    currentIndex = 0;
  }

  document.getElementById('viewer-img').src =
  images[currentIndex].src;
}

</script>

</body>
</html>
